<style>
  :root { color-scheme: light;
    --plum:#8E0F5E; --plum-dark:#6E0B49; --pink:#F6E3EF; --pink-mid:#E9BFD9;
    --bg:#FAF7F9; --card:#FFFFFF; --ink:#2B2230; --muted:#7A6B75;
    --green:#2E7D32; --amber:#C77800; --red:#C62828; --border:#EADDE5;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--ink); padding:20px 24px 40px; }
  header { display:flex; flex-wrap:wrap; align-items:baseline; gap:10px; margin-bottom:6px; }
  header h1 { font-size:22px; font-weight:800; color:var(--plum); }
  header .sub { font-size:13px; color:var(--muted); }
  .updated { font-size:12px; color:var(--muted); margin-bottom:16px; }
  .tabs { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; }
  .tab { border:1px solid var(--border); background:var(--card); color:var(--ink); padding:8px 16px; border-radius:999px; font-size:13.5px; font-weight:600; cursor:pointer; transition:all .15s; }
  .tab:hover { border-color:var(--plum); color:var(--plum); }
  .tab.active { background:var(--plum); border-color:var(--plum); color:#fff; }
  .grid { display:grid; gap:14px; }
  .kpis { grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); margin-bottom:18px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 16px; }
  .kpi .label { font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .kpi .value { font-size:26px; font-weight:800; color:var(--plum-dark); line-height:1.1; }
  .kpi .note { font-size:11.5px; color:var(--muted); margin-top:5px; }
  .charts { grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); }
  .chart-card h3 { font-size:13.5px; font-weight:700; margin-bottom:2px; }
  .chart-card .hint { font-size:11.5px; color:var(--muted); margin-bottom:10px; }
  .chart-wrap { position:relative; height:230px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { text-align:right; padding:9px 10px; border-bottom:1px solid var(--border); white-space:nowrap; }
  th:first-child, td:first-child { text-align:left; font-weight:700; }
  thead th { font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); }
  tbody tr:hover { background:var(--pink); }
  .pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11.5px; font-weight:700; }
  .pill.good { background:#E3F2E5; color:var(--green); }
  .pill.warn { background:#FFF3E0; color:var(--amber); }
  .pill.bad { background:#FDE7E7; color:var(--red); }
  .footnote { font-size:11.5px; color:var(--muted); margin-top:18px; line-height:1.5; }
  .dash { color:#C9BCC4; }
  /* Client updates tab */
  .upd-toolbar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:14px; }
  .btn { border:none; background:var(--plum); color:#fff; font-weight:700; font-size:13px; padding:9px 16px; border-radius:10px; cursor:pointer; }
  .btn.secondary { background:var(--pink); color:var(--plum-dark); }
  .btn.ghost { background:transparent; color:var(--muted); border:1px solid var(--border); }
  .btn:hover { filter:brightness(1.06); }
  .upd-form { display:none; margin-bottom:16px; }
  .upd-form.open { display:block; }
  .upd-form .row { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:10px; }
  .upd-form label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); display:block; margin-bottom:4px; }
  .upd-form input, .upd-form select, .upd-form textarea { width:100%; border:1px solid var(--border); border-radius:9px; padding:8px 10px; font-size:13.5px; font-family:inherit; background:#fff; color:var(--ink); }
  .upd-form textarea { min-height:64px; resize:vertical; }
  .upd-form .col { flex:1; min-width:160px; }
  .cards-grid { grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); align-items:start; }
  .ccard h4 { font-size:15.5px; font-weight:800; color:var(--plum-dark); }
  .ccard .head { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:8px; }
  .ccard .date { font-size:11.5px; color:var(--muted); margin-left:auto; white-space:nowrap; }
  .ccard .sec { margin-top:9px; }
  .ccard .sec .sec-label { font-size:10.5px; font-weight:800; letter-spacing:.07em; text-transform:uppercase; color:var(--plum); margin-bottom:3px; }
  .ccard .sec .sec-body { font-size:13px; line-height:1.55; white-space:pre-wrap; }
  .ccard ul.todos { list-style:none; margin-top:2px; }
  .ccard ul.todos li { font-size:13px; line-height:1.55; display:flex; gap:7px; align-items:flex-start; cursor:pointer; padding:2px 0; }
  .ccard ul.todos li .box { flex:none; width:15px; height:15px; margin-top:3px; border:1.5px solid var(--pink-mid); border-radius:4px; display:inline-flex; align-items:center; justify-content:center; font-size:11px; color:#fff; }
  .ccard ul.todos li.done .box { background:var(--plum); border-color:var(--plum); }

  .ccard .entry-tools button:hover { color:var(--plum); border-color:var(--plum); }
  .empty-state { text-align:center; color:var(--muted); font-size:13.5px; padding:30px 10px; }
</style>

const PLUM = "#8E0F5E", PINK = "#E9BFD9", GOLD = "#E0A800", GREEN = "#5B8C2A", GREY = "#BBA9B4";
const LS_CARDS = "wellzCardOverrides", LS_CARDS_DEL = "wellzCardsDeleted";
Chart.defaults.font.family = getComputedStyle(document.body).fontFamily;
Chart.defaults.color = "#7A6B75";
let charts = [];
let currentTab = "Overview";
function destroyCharts(){ charts.forEach(c=>c.destroy()); charts=[]; }
function fmtNum(v){ return v==null ? '<span class="dash">—</span>' : v.toLocaleString("en-US"); }
function fmtPct(v){ return v==null ? '<span class="dash">—</span>' : v.toLocaleString("en-US",{maximumFractionDigits:2}) + "%"; }
function npsPill(v){ if(v==null) return '<span class="dash">—</span>'; const cls = v>=50?"good":(v>=0?"warn":"bad"); return `<span class="pill ${cls}">${v>0?"+":""}${v}</span>`; }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* ----- client cards storage ----- */
function getEmbeddedCards(){ try { return JSON.parse(document.getElementById("cardsData").textContent || "[]"); } catch(e){ return []; } }
function getLS(key, fallback){ try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch(e){ return fallback; } }
function getCards(){
  const embedded = getEmbeddedCards();
  const overrides = getLS(LS_CARDS, {});
  const deleted = getLS(LS_CARDS_DEL, []);
  const names = new Set(embedded.map(c=>c.name));
  const merged = embedded.map(c => overrides[c.name] ? overrides[c.name] : c);
  Object.values(overrides).forEach(c => { if(!names.has(c.name)) merged.push(c); });
  return merged.filter(c=>!deleted.includes(c.name)).sort((a,b)=> (b.lastUpdate||"").localeCompare(a.lastUpdate||""));
}
function saveCard(card){ const o = getLS(LS_CARDS, {}); o[card.name] = card; localStorage.setItem(LS_CARDS, JSON.stringify(o)); }
function deleteCard(name){
  const o = getLS(LS_CARDS, {}); delete o[name]; localStorage.setItem(LS_CARDS, JSON.stringify(o));
  if(getEmbeddedCards().some(c=>c.name===name)){ const del = getLS(LS_CARDS_DEL, []); del.push(name); localStorage.setItem(LS_CARDS_DEL, JSON.stringify(del)); }
}

document.getElementById("updatedLine").textContent = "Data as of " + DATA.asOf + " · Reference period: last 12 completed months · Benchmarks = Wellz average";

const TAB_UPDATES = "Client Updates";
function buildTabs(){
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = "";
  const tabNames = ["Overview", TAB_UPDATES, ...DATA.companies.map(c=>c.name)];
  tabNames.forEach(n=>{
    const b = document.createElement("button");
    b.className = "tab" + (n===currentTab?" active":"");
    b.textContent = n;
    b.onclick = ()=>{ currentTab = n; document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active")); b.classList.add("active"); render(n); };
    tabsEl.appendChild(b);
  });
}

function render(name){
  destroyCharts();
  if(name==="Overview") renderOverview();
  else if(name===TAB_UPDATES) renderUpdates();
  else renderCompany(DATA.companies.find(c=>c.name===name));
}

      <div class="card kpi"><div class="label">Engaged Users</div><div class="value">${fmtNum(totEngaged)}</div><div class="note">excl. companies without data</div></div>
      <div class="card kpi"><div class="label">Sessions Delivered</div><div class="value">${fmtNum(totSessions)}</div><div class="note">accumulated</div></div>

    <div class="card" style="overflow-x:auto; margin-bottom:14px;">
      <table>
        <thead><tr><th>Company</th><th>Eligibles</th><th>Users</th><th>Sign-up</th><th>Engaged</th><th>Engagement</th><th>CSAT</th><th>NPS 30d</th><th>NPS all</th></tr></thead>
        <tbody>

            <td>${c.name}</td><td>${fmtNum(c.kpis.eligibles)}</td><td>${fmtNum(c.kpis.totalUsers)}</td>
            <td>${fmtPct(c.kpis.signUpRate)}</td><td>${fmtNum(c.kpis.engagedUsers)}</td><td>${fmtPct(c.kpis.engagementRate)}</td>
            <td>${c.kpis.csat==null?'<span class="dash">—</span>':c.kpis.csat+" / 5"}</td><td>${npsPill(c.kpis.nps30)}</td><td>${npsPill(c.kpis.npsAll)}</td>
          </tr>`).join("")}
        </tbody>
      </table>
    </div>
    <div class="grid charts">
      <div class="card chart-card"><h3>Sign-up vs Engagement Rate</h3><div class="hint">Latest values by company</div><div class="chart-wrap"><canvas id="ovRates"></canvas></div></div>

      <div class="card chart-card"><h3>Retention vs Wellz Average</h3><div class="hint">Latest available month per company</div><div class="chart-wrap"><canvas id="ovRet"></canvas></div></div>
    </div>
    <div class="footnote">Select a company tab for monthly trends, retention curve, sessions and clinical needs. AmSpec user counts were not available in the latest export.</div>`;

  const names = DATA.companies.map(c=>c.name);
  charts.push(new Chart(document.getElementById("ovRates"),{type:"bar",
    data:{labels:names,datasets:[
      {label:"Sign-up rate %",data:DATA.companies.map(c=>c.kpis.signUpRate),backgroundColor:PINK,borderRadius:6},
      {label:"Engagement rate %",data:DATA.companies.map(c=>c.kpis.engagementRate),backgroundColor:PLUM,borderRadius:6}]},

      {label:"NPS last 30d",data:DATA.companies.map(c=>c.kpis.nps30),backgroundColor:GOLD,borderRadius:6},
      {label:"NPS all period",data:DATA.companies.map(c=>c.kpis.npsAll),backgroundColor:PLUM,borderRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,scales:{y:{suggestedMin:-100,suggestedMax:100}}}}));
  charts.push(new Chart(document.getElementById("ovRet"),{type:"bar",
    data:{labels:names,datasets:[

      {label:"Wellz average % (same month)",data:DATA.companies.map(c=>c.retention.wellz[c.retention.wellz.length-1]),backgroundColor:GREY,borderRadius:6}]},

}

/* ----- Client Updates tab (one recap card per client) ----- */
const STATUS_META = { green:["good","🟢"], amber:["warn","🟡"], red:["bad","🔴"] };
function renderUpdates(){
  const v = document.getElementById("view");
  const cards = getCards();
  v.innerHTML = `
    <div class="upd-toolbar">
      <button class="btn" id="btnNew">+ New client card</button>
      <button class="btn secondary" id="btnExport">⬇ Download shareable HTML</button>
      <span style="font-size:12px;color:var(--muted)">Active clients only. Edits are saved on this computer — use Download to get the updated file for the team.</span>
    </div>
    <div class="card upd-form" id="updForm">
      <input type="hidden" id="fOrig" value="">
      <div class="row">
        <div class="col"><label>Client</label><input type="text" id="fName" placeholder="Client name"></div>
        <div class="col" style="max-width:170px"><label>Status</label><select id="fStatus"><option value="green">🟢 On track</option><option value="amber">🟡 Watch</option><option value="red">🔴 At risk</option></select></div>
        <div class="col" style="max-width:200px"><label>Status label</label><input type="text" id="fStatusLabel" placeholder="e.g. Approved — launching soon"></div>
        <div class="col" style="max-width:170px"><label>Last update</label><input type="date" id="fDate" value="${new Date().toISOString().slice(0,10)}"></div>
      </div>
      <div class="row"><div class="col"><label>Latest recap</label><textarea id="fRecap" placeholder="What happened in the latest conversation / period"></textarea></div></div>
      <div class="row"><div class="col"><label>Agreed / decided (optional)</label><textarea id="fDecided"></textarea></div></div>
      <div class="row"><div class="col"><label>CS to-do — one per line, prefix [x] if done</label><textarea id="fTodos" placeholder="Send data deck&#10;[x] Already done item"></textarea></div></div>
      <button class="btn" id="btnSave">Save card</button>
      <button class="btn ghost" id="btnCancel">Cancel</button>
    </div>
    <div class="grid cards-grid" id="cardList"></div>`;

  const list = document.getElementById("cardList");
  if(!cards.length){
    list.innerHTML = '<div class="card empty-state">No client cards yet. Click "+ New client card".</div>';
  } else {
    list.innerHTML = cards.map(c=>{
      const [cls, dot] = STATUS_META[c.status] || STATUS_META.green;
      return `
      <div class="card ccard" data-name="${esc(c.name)}">
        <div class="head"><h4>${esc(c.name)}</h4><span class="pill ${cls}">${dot} ${esc(c.statusLabel || "")}</span><span class="date">Last update: ${esc(c.lastUpdate || "")}</span></div>
        <div class="sec"><div class="sec-label">Latest recap</div><div class="sec-body">${esc(c.recap)}</div></div>
        ${c.decided ? `<div class="sec"><div class="sec-label">Agreed / decided</div><div class="sec-body">${esc(c.decided)}</div></div>` : ""}
        ${(c.todos && c.todos.length) ? `<div class="sec"><div class="sec-label">CS to-do</div>
          <ul class="todos">${c.todos.map((t,i)=>`<li class="${t.done?"done":""}" data-i="${i}"><span class="box">${t.done?"✓":""}</span><span class="txt">${esc(t.t)}</span></li>`).join("")}</ul></div>` : ""}
        <div class="entry-tools">
          <button data-act="edit">Edit</button>
          <button data-act="copy">Copy as message</button>
          <button data-act="del">Delete</button>
        </div>
      </div>`;
    }).join("");
  }

  const form = document.getElementById("updForm");
  function openForm(card){
    form.classList.add("open");
    document.getElementById("fOrig").value = card ? card.name : "";
    document.getElementById("fName").value = card ? card.name : "";
    document.getElementById("fStatus").value = card ? card.status : "green";
    document.getElementById("fStatusLabel").value = card ? (card.statusLabel||"") : "";
    document.getElementById("fDate").value = card ? card.lastUpdate : new Date().toISOString().slice(0,10);
    document.getElementById("fRecap").value = card ? card.recap : "";
    document.getElementById("fDecided").value = card ? (card.decided||"") : "";
    document.getElementById("fTodos").value = card ? (card.todos||[]).map(t=>(t.done?"[x] ":"")+t.t).join("\n") : "";
    form.scrollIntoView({behavior:"smooth"});
  }
  document.getElementById("btnNew").onclick = ()=> openForm(null);
  document.getElementById("btnCancel").onclick = ()=> form.classList.remove("open");
  document.getElementById("btnSave").onclick = ()=>{
    const name = document.getElementById("fName").value.trim();
    if(!name){ alert("Client name is required."); return; }
    const orig = document.getElementById("fOrig").value;
    if(orig && orig!==name) deleteCard(orig);
    const todos = document.getElementById("fTodos").value.split("\n").map(s=>s.trim()).filter(Boolean)
      .map(s=> s.toLowerCase().startsWith("[x]") ? {t:s.slice(3).trim(), done:true} : {t:s.replace(/^\[\s?\]\s*/,""), done:false});
    saveCard({
      name,
      status: document.getElementById("fStatus").value,
      statusLabel: document.getElementById("fStatusLabel").value.trim() || ({green:"On track",amber:"Watch",red:"At risk"})[document.getElementById("fStatus").value],
      lastUpdate: document.getElementById("fDate").value || new Date().toISOString().slice(0,10),
      recap: document.getElementById("fRecap").value.trim(),
      decided: document.getElementById("fDecided").value.trim(),
      todos
    });
    renderUpdates();
  };

  list.querySelectorAll(".ccard").forEach(cardEl=>{
    const name = cardEl.dataset.name;
    cardEl.querySelectorAll("ul.todos li").forEach(li=>{
      li.onclick = ()=>{
        const card = JSON.parse(JSON.stringify(getCards().find(c=>c.name===name)));
        const i = parseInt(li.dataset.i,10);
        card.todos[i].done = !card.todos[i].done;
        saveCard(card);
        renderUpdates();
      };
    });
    cardEl.querySelectorAll(".entry-tools button").forEach(b=>{
      b.onclick = ()=>{
        const card = getCards().find(c=>c.name===name);
        if(b.dataset.act==="edit") openForm(card);
        else if(b.dataset.act==="del"){ if(confirm("Delete the card for "+name+"?")){ deleteCard(name); renderUpdates(); } }
        else {
          const txt = `*${card.name}* — ${card.statusLabel} (last update ${card.lastUpdate})\n\n${card.recap}`
            + (card.decided ? `\n\nAgreed:\n${card.decided}` : "")
            + ((card.todos&&card.todos.length) ? `\n\nCS to-do:\n${card.todos.map(t=>(t.done?"✅ ":"▢ ")+t.t).join("\n")}` : "");
          navigator.clipboard.writeText(txt).then(()=>{ b.textContent="Copied!"; setTimeout(()=>b.textContent="Copy as message",1500); });
        }
      };
    });
  });
  document.getElementById("btnExport").onclick = exportHtml;
}

function exportHtml(){
  // Bake current cards (embedded + local edits) into the embedded JSON, serialize a clean copy, restore UI.
  const merged = getCards();
  const node = document.getElementById("cardsData");
  const prev = node.textContent;
  node.textContent = "\n" + JSON.stringify(merged, null, 1).replace(/</g, "\\u003c") + "\n";
  const tabsEl = document.getElementById("tabs"), viewEl = document.getElementById("view");
  tabsEl.innerHTML = ""; viewEl.innerHTML = "";
  const html = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
  node.textContent = prev;
  const blob = new Blob([html], {type:"text/html"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "wellz-italy-cs-dashboard.html";
  a.click();
  URL.revokeObjectURL(a.href);
  buildTabs(); render(currentTab);
}
